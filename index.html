<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 26th Birthday, My Love ❤️</title>
    
    <!-- Modern Typography: Sarabun & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-cream: #fcfaf6;
            --text-charcoal: #2a2927;
            --text-muted: #7a7772;
            --rose-gold: #d4b2a7;
            --rose-gold-glow: rgba(212, 178, 167, 0.4);
            --card-bg: #ffffff;
            --border-light: rgba(42, 41, 39, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-charcoal);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- COVER SCREEN (ENVELOPE INTRO) --- */
        #cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .envelope-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            max-width: 400px;
            width: 90%;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .envelope-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(212, 178, 167, 0.2);
        }

        .envelope-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: heartFloat 3s ease-in-out infinite;
        }

        @keyframes heartFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .envelope-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-style: italic;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .envelope-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .envelope-btn {
            background: var(--text-charcoal);
            color: var(--bg-cream);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Sarabun', sans-serif;
        }

        .envelope-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="cover-screen" onclick="startExperience()">
        <div class="envelope-card">
            <div class="envelope-icon">💌</div>
            <h2 class="envelope-title">ถึง... คนพิเศษของใจ</h2>
            <p class="envelope-subtitle">คุณได้รับจดหมายวันเกิดฉบับพิเศษ</p>
            <button class="envelope-btn">เปิดอ่านการ์ด ✨</button>
        </div>
    </div>
    
    <script>
        function startExperience() {
            const cover = document.getElementById('cover-screen');
            cover.style.opacity = '0';
            cover.style.transform = 'scale(0.95)';
            setTimeout(() => {
                cover.style.display = 'none';
            }, 800);
        }
    </script>
</body>
</html>
