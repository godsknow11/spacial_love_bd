<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 26th Birthday, My Love ❤️</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <canvas id="particles-canvas"></canvas>

    <!-- COVER SCREEN (ENVELOPE INTRO) -->
    <div id="cover-screen" onclick="startExperience()">
        <div class="envelope-card">
            <div class="envelope-icon">💌</div>
            <h2 class="envelope-title">ถึง... คนพิเศษ</h2>
            <span class="envelope-recipient">สำหรับ คนดีของเค้า</span>
            <p class="envelope-subtitle">คุณได้รับจดหมายวันเกิดฉบับพิเศษ</p>
            <p class="envelope-date" id="cover-date">เขียนด้วยใจ · กรกฎาคม 2026</p>
            <button class="envelope-btn" type="button">เปิดอ่านการ์ด ✨</button>
        </div>
    </div>

    <!-- POLAROID STORY STAGE -->
    <div class="stage-container">
        <button class="nav-arrow" id="prev-btn" onclick="prevSlide()">‹</button>
        <button class="nav-arrow" id="next-btn" onclick="nextSlide()">›</button>

        <div class="polaroid-card" id="polaroid-card">
            <!-- Polaroid Photo Frame -->
            <div class="polaroid-photo-frame">
                <div class="photo-placeholder">
                    <span class="photo-placeholder-icon">📸</span>
                    <span>วางรูปภาพคู่ของเราตรงนี้</span>
                </div>
                <img id="polaroid-img" class="polaroid-img" src="" alt="Our Memory" style="display: none;">
            </div>

            <!-- Safe Content Scrolling Container -->
            <div class="polaroid-content-scroll" id="content-scroll">
                <!-- Date & Title Meta -->
                <div class="polaroid-meta">
                    <span id="chapter-title" class="chapter-title">Chapter 01</span>
                    <span id="chapter-date" class="chapter-date">Our Journey</span>
                </div>

                <!-- Story Text Caption -->
                <p id="polaroid-caption" class="polaroid-caption"></p>
                <span class="tw-cursor" id="tw-cursor" style="display:none;"></span>
                <div class="type-hint" id="type-hint" style="display:none;">แตะเพื่อแสดงทั้งหมด</div>

                <!-- Birthday Cake Widget -->
                <div id="candle-stage" class="candle-container" onclick="blowCandle()">
                    <h4 class="candle-title">เป่าเค้กวันเกิดตรงนี้อธิษฐานนะคนเก่ง 🎂</h4>
                    <div class="cake-display">
                        <img id="cake-img" class="cake-img" src="assets/cake_lit.png" alt="Birthday Cake">
                    </div>
                    <p id="candle-hint" class="candle-hint">แตะเพื่อเป่าเทียนอธิษฐานกันนะ</p>
                </div>

                <!-- POST-BLOW FINALE MESSAGE -->
                <div class="finale-message" id="finale-message"></div>
            </div>
        </div>

        <!-- PROGRESS DOTS -->
        <div class="progress-dots" id="progress-dots"></div>
    </div>

    <script>
        /* ============================================================
         * ⚙️ CONFIGURATION LOADER (Supports URL Params & Defaults)
         * ============================================================ */
        let appConfig = {
            "envelope": {
                "recipient": "สำหรับ น้องโบว์",
                "subtitle": "คุณได้รับจดหมายวันเกิดฉบับพิเศษ",
                "date": "เขียนด้วยรักหมดหัวใจ · กรกฎาคม 2026"
            },
            "storyChapters": [
                {
                    "chapter": "Chapter 01",
                    "date": "จุดเริ่มต้นของเรา",
                    "text": "ปีนี้เป็นปีที่เราผ่านเรื่องราวด้วยกันมาเยอะเลยเนาะ มีทั้งรอยยิ้ม การเปลี่ยนแปลงต่างๆ และเรื่องราวมากมาย แต่ไม่ว่าจะต้องเจอกับอะไร แค่เราจับมือกันไว้ เค้าก็รู้ว่าเราจะผ่านมันไปได้เสมอ",
                    "image": "assets/story_chapter_01.png"
                },
                {
                    "chapter": "Chapter 02",
                    "date": "คนสำคัญของเค้า",
                    "text": "ปีนี้เห็นเธอป่วยบ่อยแล้วเค้าใจไม่ดีเลย เป็นห่วงมากๆ รู้ไหม อยากดูแลให้เธอแข็งแรง จะได้อยู่ด้วยกันไปนานๆ ไม่ว่าวันข้างหน้าจะเป็นยังไง เค้าสัญญาว่าจะเป็นเซฟโซนของเธอ และเธอก็ต้องเป็นเซฟโซนของเค้าด้วยหละ เราต้องดูแลกันและกันให้ดีที่สุดนะ",
                    "image": "assets/story_chapter_02.png"
                },
                {
                    "chapter": "Chapter 03",
                    "date": "คำสัญญาที่เป็นจริง",
                    "text": "และปีนี้... เราก็ทำก้าวแรกสำเร็จแล้วนะ ดีใจไหมที่เค้าได้ไปขอหมั้นเธอแล้ว? ทำตามสัญญาแล้วนะจ๊ะ จริงเค้าอยากทำให้มันดีกว่านี้นะ เป้าหมายต่อไปคือแต่งงาน! เค้าจะตั้งใจเก็บเงิน และจะรีบไปขอเธอไวๆ นะ (ส่วนตอนนี้ก็กินให้อ้วนไปเลยนะ 555 หยอกๆ)",
                    "image": "assets/story_chapter_03.png"
                },
                {
                    "chapter": "Chapter 04",
                    "date": "สุขสันต์วันเกิด 26 ปี",
                    "text": "ในโอกาสที่เธออายุครบ 26 ปีบริบูรณ์ ขอให้ที่รักสุขภาพแข็งแรง ไม่เจ็บไม่ป่วย หันมาออกกำลังกายบ้างนะ ถ้าวันไหนเหนื่อยหรือมีเรื่องไม่สบายใจ หันมาหาเค้าได้ตลอด เค้าพร้อมจะเป็นผู้ฟังให้เธอบ่นใส่ได้ตลอดชีวิตเลย... หลับตาเป่าเทียนแล้วอธิษฐานกันเถอะ",
                    "image": "assets/story_chapter_04.png"
                }
            ],
            "finale": {
                "title": "ขอให้ทุกคำอธิษฐานของเธอเป็นจริงนะ ❤️",
                "desc": "สำหรับเค้า ของขวัญที่ดีที่สุดคือการมีเธออยู่ตรงนี้ เติบโตไปด้วยกันในทุกๆ ปี รักโบว์มากๆ น้า",
                "footer": "สุขสันต์วันเกิดนะ คนเก่งของเค้า"
            }
        };

        let storyChapters = appConfig.storyChapters;
        let audioCtx = null;
        let candleBlown = false;
        let currentSlide = 0;
        let typeTimer = null;

        function parseUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('name')) {
                appConfig.envelope.recipient = `สำหรับ ${urlParams.get('name')}`;
            }
            if (urlParams.has('story')) {
                try {
                    const decodedData = JSON.parse(decodeURIComponent(atob(urlParams.get('story'))));
                    appConfig = { ...appConfig, ...decodedData };
                } catch (e) {
                    console.error("Failed to parse base64 story setup.", e);
                }
            }
            storyChapters = appConfig.storyChapters;
        }

        async function loadConfig() {
            parseUrlParams();
            try {
                const response = await fetch('config.json');
                if (response.ok) {
                    const data = await response.json();
                    if (!new URLSearchParams(window.location.search).has('story')) {
                        appConfig = data;
                        storyChapters = appConfig.storyChapters;
                    }
                }
            } catch (e) { }
            applyConfigToUI();
        }

        function applyConfigToUI() {
            document.querySelector('.envelope-recipient').innerText = appConfig.envelope.recipient;
            document.querySelector('.envelope-subtitle').innerText = appConfig.envelope.subtitle;
            document.getElementById('cover-date').innerText = appConfig.envelope.date;

            const finaleMessage = document.getElementById('finale-message');
            if (finaleMessage) {
                finaleMessage.innerHTML = `
                    <p>${appConfig.finale.title}</p>
                    <p class="finale-desc">${appConfig.finale.desc}</p>
                    <p class="finale-footer center"> "${appConfig.finale.footer} "</p>
                    <span class="finale-replay" onclick="replayStory()">↺ อ่านใหม่อีกครั้ง</span>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', loadConfig);

        /* ============================================================
         * Engine Core
         * ============================================================ */
        function playChime(freq, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { }
        }

        function initDeck() {
            const dotsContainer = document.getElementById('progress-dots');
            dotsContainer.innerHTML = '';
            storyChapters.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `dot ${idx === 0 ? 'active' : ''}`;
                dot.onclick = () => goToSlide(idx);
                dotsContainer.appendChild(dot);
            });
            updateSlideUI();
        }

        function typewriter(fullText) {
            clearTimeout(typeTimer);
            const caption = document.getElementById('polaroid-caption');
            const cursor = document.getElementById('tw-cursor');
            const hint = document.getElementById('type-hint');
            caption.innerText = '';
            cursor.style.display = 'inline-block';
            hint.style.display = 'block';

            let i = 0;
            const SPEED = 28;

            function step() {
                if (i < fullText.length) {
                    caption.innerText = fullText.slice(0, i + 1);
                    i++;
                    typeTimer = setTimeout(step, SPEED);
                } else {
                    cursor.style.display = 'none';
                    hint.style.display = 'none';
                }
            }
            step();
        }

        function skipTypewriter() {
            const chapter = storyChapters[currentSlide];
            clearTimeout(typeTimer);
            document.getElementById('polaroid-caption').innerText = chapter.text;
            document.getElementById('tw-cursor').style.display = 'none';
            document.getElementById('type-hint').style.display = 'none';
        }

        function updateSlideUI() {
            if (!storyChapters || storyChapters.length === 0) return;
            const chapter = storyChapters[currentSlide];
            const polaroid = document.querySelector('.polaroid-card');

            // Auto scroll container back to top when switching slides
            document.getElementById('content-scroll').scrollTop = 0;

            const rot = (currentSlide % 2 === 0 ? -1 : 1) + (Math.random() * 0.2 - 0.1);
            polaroid.style.opacity = '0.3';

            setTimeout(() => {
                document.getElementById('chapter-title').innerText = chapter.chapter;
                document.getElementById('chapter-date').innerText = chapter.date;

                const imgEl = document.getElementById('polaroid-img');
                const placeholderEl = document.querySelector('.photo-placeholder');

                if (chapter.image) {
                    imgEl.src = chapter.image;
                    imgEl.style.display = 'block';
                    placeholderEl.style.display = 'none';
                } else {
                    imgEl.style.display = 'none';
                    placeholderEl.style.display = 'flex';
                }

                const candleStage = document.getElementById('candle-stage');
                if (currentSlide === storyChapters.length - 1) {
                    candleStage.style.display = 'flex';
                } else {
                    candleStage.style.display = 'none';
                    document.getElementById('finale-message').classList.remove('show');
                }

                typewriter(chapter.text);

                document.querySelectorAll('.dot').forEach((d, idx) => {
                    d.className = `dot ${idx === currentSlide ? 'active' : ''}`;
                });

                polaroid.style.transform = `rotate(${rot}deg) translate3d(0, 0, 0)`;
                polaroid.style.opacity = '1';
            }, 250);
        }

        function nextSlide() {
            if (currentSlide < storyChapters.length - 1) {
                currentSlide++;
                updateSlideUI();
                playChime(600 + currentSlide * 50, 0.08);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateSlideUI();
                playChime(600 + currentSlide * 50, 0.08);
            }
        }

        function goToSlide(idx) {
            currentSlide = idx;
            updateSlideUI();
            playChime(600 + currentSlide * 50, 0.08);
        }

        document.getElementById('polaroid-card').addEventListener('click', function (e) {
            if (e.target.closest('.candle-container') || e.target.closest('.finale-replay')) return;
            const cursor = document.getElementById('tw-cursor');
            if (cursor && cursor.style.display === 'inline-block') {
                skipTypewriter();
            }
        });

        function startExperience() {
            const cover = document.getElementById('cover-screen');
            cover.style.opacity = '0';
            cover.style.transform = 'scale(0.95)';
            setTimeout(() => {
                cover.style.display = 'none';
                initBackgroundHearts();
                initDeck();
            }, 800);
        }

        function replayStory() {
            candleBlown = false;
            document.getElementById('cake-img').src = 'assets/cake_lit.png';
            document.getElementById('candle-hint').innerText = 'แตะเพื่อเป่าเทียนอธิษฐานกันนะ';
            document.getElementById('finale-message').classList.remove('show');
            currentSlide = 0;
            updateSlideUI();
            playChime(523.25, 0.15);
        }

        // --- CANVAS PARTICLE SYSTEM ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let bgHearts = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class HeartParticle {
            constructor(isInit = false) {
                this.x = Math.random() * canvas.width;
                this.y = isInit ? Math.random() * canvas.height : canvas.height + 20;
                this.size = Math.random() * 6 + 4;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = -(Math.random() * 0.4 + 0.3);
                this.opacity = Math.random() * 0.10 + 0.04;
                this.angle = Math.random() * Math.PI * 2;
                this.oscSpeed = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.y += this.speedY;
                this.angle += this.oscSpeed;
                this.x += this.speedX + Math.sin(this.angle) * 0.15;
                if (this.y < -20) {
                    this.y = canvas.height + 20;
                    this.x = Math.random() * canvas.width;
                    this.opacity = Math.random() * 0.10 + 0.04;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff7096';
                ctx.beginPath();
                const x = this.x;
                const y = this.y;
                const size = this.size;
                ctx.moveTo(x, y + size / 4);
                ctx.quadraticCurveTo(x, y, x - size / 2, y);
                ctx.quadraticCurveTo(x - size, y, x - size, y + size / 2);
                ctx.quadraticCurveTo(x - size, y + size, x, y + size * 1.4);
                ctx.quadraticCurveTo(x + size, y + size, x + size, y + size / 2);
                ctx.quadraticCurveTo(x + size, y, x + size / 2, y);
                ctx.quadraticCurveTo(x, y, x, y + size / 4);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        class ConfettiParticle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || -20;
                this.size = Math.random() * 5 + 3;
                this.color = ['#ff7096', '#ffbe0b', '#1db954', '#d4b2a7', '#ffffff'][Math.floor(Math.random() * 5)];
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 3 + 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    const idx = particles.indexOf(this);
                    if (idx > -1) particles.splice(idx, 1);
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initBackgroundHearts() {
            bgHearts = [];
            for (let i = 0; i < 20; i++) {
                bgHearts.push(new HeartParticle(true));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgHearts.forEach(h => { h.update(); h.draw(); });
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function triggerConfetti() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    particles.push(new ConfettiParticle(canvas.width / 2, canvas.height * 0.4));
                }, i * 15);
            }
        }

        function blowCandle() {
            if (candleBlown) return;
            candleBlown = true;
            document.getElementById('cake-img').src = 'assets/cake_blown.png';
            document.getElementById('candle-hint').innerText = 'คำอธิษฐานส่งถึงดวงดาวแล้วนะ 💖';

            const finaleEl = document.getElementById('finale-message');
            finaleEl.classList.add('show');

            // Auto scroll down inside the card to fully reveal the finale text on tiny phones
            setTimeout(() => {
                const scrollContainer = document.getElementById('content-scroll');
                scrollContainer.scrollTo({
                    top: scrollContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }, 300);

            playChime(523.25, 0.2);
            setTimeout(() => playChime(659.25, 0.2), 100);
            setTimeout(() => playChime(783.99, 0.3), 200);
            setTimeout(() => playChime(1046.50, 0.4), 300);

            triggerConfetti();
        }
    </script>
</body>

</html>
